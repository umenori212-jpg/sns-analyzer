<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS動画分析AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            SNS動画分析AI
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold mt-2">動画をAI分析</span></h1>
        <p class="lead text-muted fw-bold">アップロードするだけでジャンル・投稿文・タグを自動生成</p>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm p-2">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">📤 ファイルをアップロード</h5>

                    <form action="/analyze" method="post" enctype="multipart/form-data" id="uploadForm">
                        <div class="upload-area p-5 text-center mb-4" id="dropZone">
                            <div style="font-size:3rem;">🎥</div>
                            <p class="fw-semibold mb-1 mt-2">ここにドラッグ&ドロップ</p>
                            <p class="text-muted small mb-3">または</p>
                            <label for="video" class="btn btn-outline-primary px-4">
                                <i class="bi bi-folder2-open me-2"></i>ファイルを選択
                            </label>
                            <input type="file" id="video" name="video"
                                   accept="video/mp4,video/quicktime,video/avi,image/jpeg,image/png"
                                   class="d-none" required>
                            <p class="text-muted small mt-3 mb-0">MP4 / MOV / AVI / JPG / PNG（最大200MB）</p>
                        </div>

                        <div id="fileInfo" class="alert rounded-3 d-none mb-4"
                             style="background:var(--pastel-green); border:none;">
                            📁 <span id="fileName"></span>
                            <span class="text-muted ms-2 small" id="fileSize"></span>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg py-3 fw-bold" id="submitBtn" style="background:#f06a78; color:white; border:none;">
                                AI分析スタート
                            </button>
                        </div>
                    </form>

                    <div id="loadingIndicator" class="text-center d-none mt-4">
                        <div class="spinner-border mb-3" style="color:#ff80b3;" role="status"></div>
                        <p class="fw-semibold">分析中...🔍</p>
                        <p class="text-muted small">動画の場合は1〜2分かかることがあります</p>
                        <div class="progress mt-2" style="height:8px; border-radius:10px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated"
                                 style="width:100%; background:linear-gradient(90deg,#ffb3d1,#b3c8ff);"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mt-4 p-2" style="background:var(--pastel-purple);">
                <div class="card-body p-3">
                    <p class="fw-bold mb-2 small">分析でわかること</p>
                    <div class="row g-1">
                        <div class="col-6"><small>🎭 動画ジャンル</small></div>
                        <div class="col-6"><small>📊 バズりスコア</small></div>
                        <div class="col-6"><small>👥 想定ターゲット</small></div>
                        <div class="col-6"><small>✍️ 英語投稿文</small></div>
                        <div class="col-6"><small>#️⃣ 英語ハッシュタグ</small></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 mt-5">
    <small>SNS動画分析AI | Powered by Google Gemini API</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/upload.js"></script>
</body>
</html>
